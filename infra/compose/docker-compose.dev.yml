services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: researchlens
      POSTGRES_USER: researchlens
      POSTGRES_PASSWORD: researchlens
    ports:
      - "5432:5432"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      - postgres
    environment:
      APP_ENVIRONMENT: development
      APP_API_HOST: 0.0.0.0
      APP_API_PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-db}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY}
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      - postgres
    environment:
      APP_ENVIRONMENT: development
      DATABASE_URL: ${DATABASE_URL}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-db}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY}

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:5173"

  tests:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      - postgres
    environment:
      APP_ENVIRONMENT: test
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./.data/test.db}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-db}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY}
    command: ["uv", "run", "--package", "researchlens-backend", "pytest", "packages/backend/tests"]
