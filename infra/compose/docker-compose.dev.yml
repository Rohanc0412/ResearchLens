x-web-env: &web_env
  - VITE_API_BASE_URL

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: researchlens
      POSTGRES_USER: researchlens
      POSTGRES_PASSWORD: researchlens
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchlens -d researchlens"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5547:5432"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *backend_env
    ports:
      - "8017:8017"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *backend_env

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend_env
    command:
      [
        "uv",
        "run",
        "--package",
        "researchlens-backend",
        "alembic",
        "-c",
        "packages/backend/alembic.ini",
        "upgrade",
        "head",
      ]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment: *web_env
    ports:
      - "4273:4273"

  tests:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend_env
    command: ["uv", "run", "--package", "researchlens-backend", "pytest", "packages/backend/tests"]
