name: CI

on:
  push:
  pull_request:

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Install Python dependencies
        run: uv sync --all-packages --group dev --frozen

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: |
          uv run --package researchlens-backend ruff check .
          pnpm lint

      - name: Typecheck
        run: |
          uv run --package researchlens-backend mypy apps/api/src apps/worker/src packages/backend/src packages/backend/tests
          pnpm typecheck

      - name: Architecture
        run: uv run --package researchlens-backend lint-imports --config .importlinter

      - name: Test
        run: |
          uv run --package researchlens-backend pytest packages/backend/tests
          pnpm test

      - name: Build
        run: pnpm build
